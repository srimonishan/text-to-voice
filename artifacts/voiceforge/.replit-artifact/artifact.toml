kind = "web"
previewPath = "/"
title = "VoiceForge AI"
version = "1.0.0"
id = "artifacts/voiceforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25955

[services.development]
run = "pnpm --filter @workspace/voiceforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voiceforge", "run", "build" ]
publicDir = "artifacts/voiceforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25955"
BASE_PATH = "/"
